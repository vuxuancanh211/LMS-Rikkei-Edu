services:
  db:
    image: pgvector/pgvector:pg17
    container_name: postgres-pgvector
    restart: always
    env_file:
      - backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    env_file:
      - backend/.env
    volumes:
      - redis_data:/data
    command:
      [
        "sh",
        "-c",
        'redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"',
      ]
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms-rikkei-edu
    restart: always
    expose:
      - "8080"
    env_file:
      - backend/.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
    container_name: lms-rikkei-edu-frontend
    restart: always
    expose:
      - "80"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./backend/src/main/java/project/lms_rikkei_edu/infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
