spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=false
management.endpoints.web.exposure.include=health
spring.sql.init.mode=never
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lms_test}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:lms}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:lms_test_pwd}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=

# Secret gia de context khoi dong
JWT_SECRET=test-secret-key-must-be-at-least-32-characters
MAIL_FROM=test@example.com
SENDGRID_API_KEY=test_sendgrid_key
AWS_ACCESS_KEY=test_access_key
AWS_SECRET_KEY=test_secret_key
AWS_REGION=ap-southeast-1
AWS_S3_BUCKET=test-bucket
aws.region=ap-southeast-1
spring.cloud.aws.region.static=ap-southeast-1
spring.cloud.aws.credentials.access-key=test_access_key
spring.cloud.aws.credentials.secret-key=test_secret_key
