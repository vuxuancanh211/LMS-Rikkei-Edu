spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB}
spring.jpa.show-sql=true

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.mail.properties.mail.debug=true

spring.flyway.locations=classpath:db/migration,classpath:db/migration/dev

# Local dev fallback values. Production still requires real env variables from application.properties.
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY:dummy-access-key}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY:dummy-secret-key}
cloud.aws.region.static=${AWS_REGION:ap-southeast-1}
app.s3.bucket=${AWS_S3_BUCKET:dummy-bucket}
