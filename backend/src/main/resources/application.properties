spring.application.name=LMS Rikkei Edu
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# DATASOURCE
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration

# Redis
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.database=0
spring.data.redis.timeout=2000ms

spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.max-active=16

# TTL
app.redis.ttl.cache-default=300
app.redis.ttl.course-detail=600
app.redis.ttl.refresh-token=604800
app.redis.ttl.access-token-blacklist=3600
app.redis.ttl.password-reset-token=600
app.redis.ttl.rate-limit-window=60
app.redis.ttl.rate-limit-max=100

# SendGrid SMTP
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=${MAIL_FROM:vuxuancanh2004@gmail.com}
app.mail.from-name=${MAIL_FROM_NAME:Rikkei Edu}

# AWS S3
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.region.static=${AWS_REGION}
cloud.aws.stack.auto=false

app.s3.bucket=${AWS_S3_BUCKET}
app.s3.presigned-url-expiry=3600

# Upload limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB
app.forum.attachments.content-token-ttl-seconds=3600
app.forum.attachments.orphan-ttl-hours=24
app.forum.attachments.cleanup-delay-ms=3600000

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600000}

# Auth
app.auth.password-reset-url=${PASSWORD_RESET_URL:http://localhost:5173/reset-password}
app.auth.login-url=${LOGIN_URL:http://localhost:5173/login}
app.auth.default-temp-password=${DEFAULT_TEMP_PASSWORD:123456@}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

logging.level.org.flywaydb=DEBUG
