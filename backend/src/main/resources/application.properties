spring.application.name=LMS Rikkei Edu

# DATASOURCE
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL INIT
spring.sql.init.mode=never

# Redis
#spring.data.redis.host=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.database=0
spring.data.redis.timeout=2000ms

# Lecttuce connection pool
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.max-active=16

# TTL
app.redis.ttl.cache-default=300
app.redis.ttl.course-detail=600
app.redis.ttl.refresh-token=604800
app.redis.ttl.access-token-blacklist=3600
app.redis.ttl.rate-limit-window=60
app.redis.ttl.rate-limit-max=100

# SendGrid SMTP
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug=true

#  App mail info
app.mail.from=vuxuancanh2004@gmail.com
app.mail.from-name=Rikei Edu

# AWS S3
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.region.static=${AWS_REGION}
cloud.aws.stack.auto=false

app.s3.bucket=${AWS_S3_BUCKET}
app.s3.presigned-url-expiry=3600